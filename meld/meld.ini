[/]
draw-spaces=['space', 'tab', 'newline', 'nbsp', 'leading', 'text', 'trailing']
enable-space-drawer=true
filename-filters=[('Backups', true, '#*# .#* ~* *~ *.{orig,bak,swp}'), ('OS-specific metadata', true, '.DS_Store ._* .Spotlight-V100 .Trashes Thumbs.db Desktop.ini'), ('Version Control', true, '_MTN .bzr .svn .svn .hg .fslckout _FOSSIL_ .fos CVS _darcs .git .svn .osc'), ('Binaries', true, '*.{pyc,a,obj,o,so,la,lib,dll,exe}'), ('Media', true, '*.{jpg,gif,png,bmp,wav,mp3,ogg,flac,avi,mpg,xcf,xpm}'), ('Terraform', true, '.terraform{,.lock.hcl} *.tfstate')]
folder-columns=[('size', true), ('modification time', true), ('permissions', true), ('iso-time', false)]
folder-shallow-comparison=false
folder-status-filters=['normal', 'normal', 'new', 'modified']
highlight-current-line=true
highlight-syntax=true
ignore-blank-lines=true
indent-width=4
insert-spaces-instead-of-tabs=true
prefer-dark-theme=true
show-line-numbers=true
style-scheme='oblivion'
text-filters=[('CVS/SVN keywords', false, '\\$\\w+(:[^\\n$]+)?\\$'), ('C++ comment', false, '//.*'), ('C comment', false, '/\\*.*?\\*/'), ('All whitespace', true, '[ \\t\\r\\f\\v]*'), ('Leading whitespace', false, '^[ \\t\\r\\f\\v]*'), ('Trailing whitespace', false, '[ \\t\\r\\f\\v]*$'), ('Script comment', false, '#.*')]
wrap-mode='word'

[window-state]
is-maximized=true
