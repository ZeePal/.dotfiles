"$schema" = 'https://starship.rs/config-schema.json'

format = """
$time\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$hg_state\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$gleam\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$nats\
$direnv\
$env_var\
$mise\
$crystal\
$custom\
$cmd_duration\
$line_break\
$jobs\
$battery\
$status\
$os\
$container\
$netns\
$shell\
$directory\
$sudo\
$character"""

add_newline = false
[line_break]
disabled = true

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
[cmd_duration]
format = " [$duration]($style) "

[gcloud.region_aliases]
australia-southeast1 = "au"
[aws.region_aliases]
ap-southeast-2 = "au"

[git_branch]
symbol = "🌱"
format = "[$symbol$branch]($style) "
[git_state]
cherry_pick = "🍒"
[docker_context]
symbol = "🐋"
format = "[$symbol$context]($style) "
[package]
symbol = "📦"
format = "[$symbol$version]($style) "

[gcloud]
symbol = "󱇶 "
format = '[$symbol$active(\($region\))]($style) '
[aws]
symbol = " "
format = '[$symbol$profile(\($region\))]($style) '
force_display = true

[python]
symbol = "🐍"
format = '[${symbol}${pyenv_prefix}${version}( \($virtualenv\))]($style) '
[rust]
symbol = "🦀"
format = "[$symbol$version]($style) "
[golang]
symbol = "🐹"
format = "[$symbol$version]($style) "
[terraform]
symbol = "💠"
format = "[$symbol$workspace]($style) "

[memory_usage]
disabled = false
symbol = "🐏"
format = "$symbol [${ram_pct}]($style) "

[sudo]
disabled = false
symbol = "🧙"
format = "[$symbol]($style)"
