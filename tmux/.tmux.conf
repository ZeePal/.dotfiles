# Change Prefix from Ctrl-B to Ctrl-A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# more buffer!
set -g history-limit 10000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Set mouse on for easy scrollback
set -g mouse on

# Easy reload config
bind-key -T prefix r source-file ~/.tmux.conf

# Give me my esc key back
set -s escape-time 0

# Status bar colors & position
set -g status-position top
set -g status-style 'bg=#111111 fg=#9d65ff'

# Skip wrapper commands like sudo/bwrap when auto-naming windows.
set -g automatic-rename on
set -g automatic-rename-format "#(exec ~/bin/helpers/tmux_window_name '#{pane_pid}' '#{pane_current_command}')"

# Always Vi mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Create Pane: Ctrl-Alt-[rd] (Right or Down)
bind-key -T root C-M-r split-window -h -c "#{pane_current_path}"
bind-key -T root C-M-d split-window -c "#{pane_current_path}"

# Create Window/Tab: Prefix-c
bind-key -T prefix c new-window -c "#{pane_current_path}"

# Select Pane: Alt-Arrow
bind-key -n M-Up if-shell -F "#{||:#{window_zoomed_flag},#{==:#{window_panes},1}}" "send-keys M-Up" "select-pane -U"
bind-key -n M-Down if-shell -F "#{||:#{window_zoomed_flag},#{==:#{window_panes},1}}" "send-keys M-Down" "select-pane -D"
bind-key -n M-Left if-shell -F "#{||:#{window_zoomed_flag},#{==:#{window_panes},1}}" "send-keys M-Left" "select-pane -L"
bind-key -n M-Right if-shell -F "#{||:#{window_zoomed_flag},#{==:#{window_panes},1}}" "send-keys M-Right" "select-pane -R"

# Resize Pane: Ctrl-Alt-Arrow
bind-key -T root C-M-Up resize-pane -U
bind-key -T root C-M-Down resize-pane -D
bind-key -T root C-M-Left resize-pane -L
bind-key -T root C-M-Right resize-pane -R

# print git repo or CWD in top right
set -g status-interval 5
set -g status-right "#(exec ~/bin/helpers/tmux_git_status '#{pane_current_path}')"

# renumber windows/"tabs" when a gap comes
set -g renumber-windows on

# allow term apps to set clipboard
set -g set-clipboard on

# extended keys
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
